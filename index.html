<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Cosita Preciosa ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:2rem;
text-align:center;
padding:20px;
background:black;
z-index:100;
transition:1.5s;
}

.hidden{
opacity:0;
pointer-events:none;
}

#universe{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#34124d 0%,#120024 50%,#000 100%);
overflow:hidden;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

.container{
position:relative;
z-index:5;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:3rem;
color:#ffd6f5;
margin-bottom:20px;
}

#counter{
font-size:1.2rem;
margin-bottom:25px;
}

#message{
font-size:1.4rem;
max-width:800px;
min-height:120px;
padding:20px;
}

button{
padding:12px 28px;
border:none;
border-radius:25px;
cursor:pointer;
font-size:1rem;
background:#ff4fa0;
color:white;
}

button:hover{
transform:scale(1.05);
}

.heart{
font-size:2rem;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>
  <div style="margin-top:25px;">
<p>🎵 Dale play antes de leer, amorcito 💗</p>

<iframe
width="300"
height="170"
src="https://www.youtube.com/embed/FGK2KkqaHow"
title="Golden Hour"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
</div>
  
<body>

<div id="intro">
<span id="introText">Hola cosita preciosa 💗</span>
</div>

<div id="universe">

<div class="container">

<h1>Feliz Primer Mes ❤️</h1>

<div class="heart">💗</div>

<div id="counter"></div>

<div id="message">
Presiona el botón, amorcito ❤️
</div>

<button onclick="nextMessage()">
Leer 💕
</button>

</div>

</div>

<script>

/* ESTRELLAS */

for(let i=0;i<300;i++){

const star=document.createElement("div");

star.className="star";

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDuration=
(Math.random()*4+2)+"s";

document.getElementById("universe")
.appendChild(star);

}

/* INTRO */

const introText=
document.getElementById("introText");

setTimeout(()=>{
introText.innerHTML=
"Tengo algo importante que decirte...";
},3000);

setTimeout(()=>{
introText.innerHTML=
"Gracias por este primer mes ❤️";
},6500);

setTimeout(()=>{
document.getElementById("intro")
.classList.add("hidden");
},10000);

/* CONTADOR */

const startDate=
new Date("2026-05-22");

function updateCounter(){

let now=new Date();

let diff=now-startDate;

let days=
Math.floor(diff/(1000*60*60*24));

document.getElementById("counter")
.innerHTML=
`❤️ Llevamos ${days} días juntos ❤️`;

}

updateCounter();

/* MENSAJES */

const messages=[

"Gracias por aparecer en mi vida 💗",

"Gracias por cada mensaje que me envías 😭",

"Gracias por cada partida que jugamos juntos 🎮",

"Gracias por cada regalo y cada detalle 💕",

"Gracias por confiar en mí ❤️",

"Gracias por hacerme sentir querido 🥹",

"Me encanta pasar tiempo contigo 💗",

"Me encanta escucharte 😭",

"Me encanta jugar contigo 🎣",

"Y me encanta poder llamarte mi amor ❤️",

"Este es solo nuestro primer mes...",

"Pero espero que sea el primero de muchos más 💕",

"Porque mi lugar favorito...",

"Siempre termina siendo donde estés tú ❤️"

];

let current=0;

function nextMessage(){

if(current<messages.length){

document.getElementById("message")
.innerHTML=messages[current];

current++;

}

}

</script>

</body>
</html>
