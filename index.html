<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Cosita Preciosa ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#000;
overflow-x:hidden;
overflow-y:auto;
color:white;
}

#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
text-align:center;
font-size:2rem;
padding:20px;
z-index:999;
transition:2s;
}

.hidden{
opacity:0;
pointer-events:none;
}

#universe{
position:absolute;
width:100%;
min-height:100vh;
background:
radial-gradient(circle at center,#4a1768 0%,#1d0136 50%,#000 100%);
overflow:hidden;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

.floating-heart{
position:absolute;
font-size:20px;
animation:floatUp linear infinite;
opacity:.8;
}

@keyframes floatUp{
from{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
to{
transform:translateY(-120vh);
opacity:0;
}
}

.container{
position:relative;
z-index:5;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:40px 20px;
}

h1{
font-size:3rem;
color:#ffd6f5;
margin-bottom:15px;
text-shadow:0 0 15px #ff7bd5;
}

.photo{
width:420px;
max-width:90%;
border-radius:25px;
margin:20px 0;
box-shadow:0 0 40px rgba(255,120,200,.7);
animation:photoFloat 4s ease-in-out infinite;
}

@keyframes photoFloat{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
}

.caption{
color:#ffc7ec;
margin-bottom:15px;
font-size:1rem;
}

#counter{
margin-bottom:20px;
font-size:1.1rem;
color:#ffe3f7;
}

#message{
font-size:1.35rem;
max-width:800px;
min-height:130px;
padding:20px;
line-height:1.6;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:1rem;
margin:8px;
background:#ff4fa0;
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.heart{
font-size:2rem;
animation:pulse 2s infinite;
margin-bottom:10px;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}
}

#finalMessage{
display:none;
font-size:1.6rem;
max-width:900px;
line-height:1.8;
padding:20px;
color:#ffd8f3;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div id="intro">
<div id="introText">
Hola mami 💗
</div>
</div>

<div id="universe">

<div class="container">

<h1>Feliz Primer Mes ❤️</h1>

<img src="skins.png" class="photo">

<div class="caption">
Mi skin favorita siempre será la que está a tu lado 💗
</div>

<div class="heart">💗</div>

<div id="counter"></div>

<button onclick="playMusic()">
🎵 Dale play a nuestra canción 💗
</button>

<div style="margin-top:10px;">
<iframe id="music"
width="0"
height="0"
src=""
allow="autoplay">
</iframe>
</div>

<div id="message">
Presiona "Leer 💕", amorcito ❤️
</div>

<button id="readBtn" onclick="nextMessage()">
Leer 💕
</button>

<div id="finalMessage"></div>

</div>

</div>

<script>

/* ESTRELLAS */

for(let i=0;i<400;i++){

let star=document.createElement("div");

star.className="star";

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDuration=
(Math.random()*4+2)+"s";

document.getElementById("universe")
.appendChild(star);

}

/* CORAZONES */

function createHeart(){

let heart=document.createElement("div");

heart.className="floating-heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=
(Math.random()*5+5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);

}

setInterval(createHeart,600);

/* INTRO */

const introText=
document.getElementById("introText");

setTimeout(()=>{
introText.innerHTML=
"Tengo algo importante que decirte...";
},3000);

setTimeout(()=>{
introText.innerHTML=
"Gracias por este primer mes, cosita preciosa ❤️";
},6500);

setTimeout(()=>{
document.getElementById("intro")
.classList.add("hidden");
},10000);

/* CONTADOR */

const startDate=
new Date("2026-05-22");

function updateCounter(){

let now=new Date();

let diff=now-startDate;

let days=
Math.floor(diff/(1000*60*60*24));

let hours=
Math.floor(diff/(1000*60*60));

let minutes=
Math.floor(diff/(1000*60));

document.getElementById("counter")
.innerHTML=
`
❤️ ${days} días juntos ❤️
<br>
${hours} horas ❤️
<br>
${minutes} minutos ❤️
`;

}

updateCounter();

/* MUSICA */

function playMusic(){

document.getElementById("music").src=
"https://www.youtube.com/embed/FGK2KkqaHow?autoplay=1";

}

/* MENSAJES */

const messages=[

"Gracias por aparecer en mi vida, mami 💗",

"Gracias por cada mensaje que me envías 😭",

"Gracias por cada partida que compartimos 🎮",

"Gracias por cada detalle que has tenido conmigo 💕",

"Gracias por confiar en mí ❤️",

"Gracias por hacerme sentir querido 🥹",

"Me encanta pasar tiempo contigo 💗",

"Me encanta escucharte ❤️",

"Me encanta jugar contigo 🎣",

"Me encanta poder llamarte mi amor 💕",

"Este es solo nuestro primer mes...",

"Pero espero que sea el primero de muchísimos más 🌌",

"Porque contigo incluso los días normales se vuelven especiales 💗",

"Y porque mi lugar favorito siempre termina siendo donde estés tú ❤️"

];

let current=0;

function typeWriter(text){

let i=0;

document.getElementById("message")
.innerHTML="";

let interval=setInterval(()=>{

document.getElementById("message")
.innerHTML+=text.charAt(i);

i++;

if(i>=text.length){
clearInterval(interval);
}

},40);

}

function nextMessage(){

if(current<messages.length){

typeWriter(messages[current]);

current++;

}else{

document.getElementById("message")
.style.display="none";

document.getElementById("readBtn")
.style.display="none";

document.getElementById("finalMessage")
.style.display="block";

document.getElementById("finalMessage")
.innerHTML=
`
💗 Te amo muchísimo, mi cosita preciosa 💗

<br><br>

📅 22 de mayo ❤️ 22 de junio

<br><br>

Gracias por este primer mes.

<br><br>

Gracias por cada mensaje.

<br>

Gracias por cada llamada.

<br>

Gracias por cada partida.

<br>

Gracias por cada momento juntos.

<br><br>

Tal vez sea solo un mes...

<br><br>

Pero ha sido uno de los meses más bonitos de mi vida. ❤️

<br><br>

Y si pudiera volver al día en que empezamos...

<br><br>

Te elegiría otra vez.

<br>

Y otra vez.

<br>

Y todas las veces que hiciera falta. 💕

<br><br>

🌌 Feliz primer mes, mi amorcito 🌌

<br><br>

💌 Te amo muchísimo 💌
`;
  
for(let i=0;i<100;i++){

setTimeout(createHeart,i*120);

}

}

}

</script>

</body>
</html>
